name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.rust == 'beta' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run tests (lib)
        run: cargo test --lib --verbose
      
      - name: Run tests (integration)
        run: cargo test --tests --verbose
      
      - name: Run doc tests
        run: cargo test --doc --verbose

  test-msrv:
    name: Test MSRV (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --lib --verbose

  test-all-features:
    name: Test All Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run all tests with all features
        run: cargo test --all-features --verbose

  platform-geo-smoke:
    name: Platform Geo Smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run platform geolocation smoke tests
        run: cargo test --test platform_geo_smoke --verbose
        env:
          DRIFTWATCH_PLATFORM_SMOKE: "0"
