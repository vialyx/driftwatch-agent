name: Release Integrity

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: release-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    name: Build + SBOM + Provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release artifact
        run: cargo build --release --locked

      - name: Stage release files
        run: |
          mkdir -p dist
          cp target/release/driftwatch-agent dist/driftwatch-agent
          sha256sum dist/driftwatch-agent > dist/SHA256SUMS

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: dist/driftwatch-agent
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - name: Upload integrity bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-integrity-bundle
          path: |
            dist/driftwatch-agent
            dist/SHA256SUMS
            dist/sbom.spdx.json
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/driftwatch-agent
            dist/SHA256SUMS
            dist/sbom.spdx.json
