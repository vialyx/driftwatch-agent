name: Security & Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security audit weekly
    - cron: '0 0 * * 0'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      
      - name: Run cargo audit
        run: cargo audit --deny warnings

  security-scan:
    name: Security Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run cargo check
        run: cargo check --all-targets --all-features --verbose
      
      - name: Run clippy with security focus
        run: cargo clippy --all-targets --all-features --message-format=json > clippy-report.json

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Run cargo deny policy checks
        run: cargo deny --log-level warn check advisories bans licenses sources

  outdated:
    name: Outdated Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked
      
      - name: Check outdated dependencies
        run: cargo outdated --exit-code 1
